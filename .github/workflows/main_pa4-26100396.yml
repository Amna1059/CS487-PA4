name: Deploy Node.js to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: webapp
        run: npm install

      - name: Build
        working-directory: webapp
        run: npm run build --if-present

      - name: Create ZIP
        run: |
          cd webapp
          zip -r ../deploy.zip .

      - name: Deploy via ZipDeploy
        run: |
          curl -X POST \
            "https://pa4-26100396-dxa9d8b8g4c5aza0.scm.ukwest-01.azurewebsites.net/api/zipdeploy" \
            -u "${{ secrets.AZURE_WEBAPP_USERNAME }}:${{ secrets.AZURE_WEBAPP_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            -v
